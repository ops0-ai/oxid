[target.x86_64-unknown-linux-musl]
pre-build = [
    "apt-get update && apt-get install -y curl unzip",
    "curl -fsSL https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip -o /tmp/protoc.zip && unzip -o /tmp/protoc.zip -d /usr/local && chmod +x /usr/local/bin/protoc && rm /tmp/protoc.zip"
]

[target.aarch64-unknown-linux-musl]
pre-build = [
    "apt-get update && apt-get install -y curl unzip",
    "curl -fsSL https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip -o /tmp/protoc.zip && unzip -o /tmp/protoc.zip -d /usr/local && chmod +x /usr/local/bin/protoc && rm /tmp/protoc.zip"
]
